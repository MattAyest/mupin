# =============================================================================
# PER-NODE LLM CONFIGURATION — Mupin Planner
# =============================================================================

nodes:
    # Reads the operator's goal and decides what clarifying questions to ask.
    clarify:
        provider: "ollama-cloud"
        model: "kimi-k2.7-code:cloud"
        temperature: 0.3
        api_key_env_var: "OLLAMA_API_KEY"

    # Decomposes the clarified goal into a project structure + task list.
    plan:
        provider: "ollama-cloud"
        model: "kimi-k2.7-code:cloud"
        temperature: 0.2
        api_key_env_var: "OLLAMA_API_KEY"

    # Decides next action after inspecting a job result.
    decide:
        provider: "ollama-cloud"
        model: "kimi-k2.7-code:cloud"
        temperature: 0.2
        api_key_env_var: "OLLAMA_API_KEY"

resilience:
    infra_max_retries_per_node: 5
    infra_retry_backoff_seconds: [10, 30, 60, 120, 120]
    stream_idle_seconds: 120

server:
    # Hard wall-clock backstop per workflow (seconds).
    workflow_deadline_seconds: 14400