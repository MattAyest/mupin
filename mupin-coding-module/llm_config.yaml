# =============================================================================
# PER-NODE LLM CONFIGURATION
# =============================================================================
# Each pipeline node picks its own supplier + model.
#
#   provider:         google-genai | openai | anthropic | ollama-cloud | ollama | openai-compatible
#   model:            the model id for that provider
#   temperature:      sampling temperature
#   api_key_env_var:  name of the env var holding the credential
#   base_url:         (openai-compatible only) URL of the self-hosted server
#
# WORKLOAD TIERS
#   light   -> short classify/summarize calls         e.g. nemotron-3-nano:30b-cloud
#   heavy   -> strong coding / long reasoning          e.g. kimi-k2.7-code:cloud
#   premium -> the "very heaviest lifting" — frontier APIs
# =============================================================================

nodes:
    # Designs the lean baseline test suite from the prompt.
    # WORKLOAD: premium — reasoning about prompt coverage and Hypothesis strategies.
    test_designer:
        provider: "ollama-cloud"
        model: "kimi-k2.7-code:cloud"
        temperature: 0.2
        api_key_env_var: "OLLAMA_API_KEY"

    # Derives the src/main.py skeleton from the generated tests and checks contract compatibility.
    # WORKLOAD: medium — signature extraction plus compatibility reasoning.
    skeleton_maker:
        provider: "ollama-cloud"
        model: "kimi-k2.7-code:cloud"
        temperature: 0.2
        api_key_env_var: "OLLAMA_API_KEY"

    # Implements src/main.py against the frozen tests.
    # WORKLOAD: premium — heaviest coding in the pipeline.
    coder:
        provider: "ollama-cloud"
        model: "kimi-k2.7-code:cloud"
        temperature: 0.1
        api_key_env_var: "OLLAMA_API_KEY"

loop_limits:
    max_sandbox_loops: 5

resilience:
    # Per-node infra retries for transient LLM faults (timeouts, 5xx, conn drops).
    infra_max_retries_per_node: 5
    infra_retry_backoff_seconds: [10, 30, 60, 120, 120]
    # Streaming liveness watchdog: abort an LLM call if no new stream chunk
    # arrives within this many seconds.  Catches mid-stream Ollama Cloud stalls
    # (observed hanging ~900s emitting zero tokens) without cutting off slow-
    # but-progressing generations.  Override per-node via the node's config:
    #   stream_idle_seconds: 60
    stream_idle_seconds: 120

server:
    # Hard wall-clock backstop per task (seconds). The orchestrator auto-cancels
    # a task that exceeds this, even if the client never called /cancel.
    task_deadline_seconds: 7200
