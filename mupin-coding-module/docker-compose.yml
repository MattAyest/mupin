services:
  coding-module-api:
    build: .
    container_name: coding_module_api
    restart: always
    ports:
      - "8000:8000"
    volumes:
      # Map docker.sock so the container can spin up sibling containers for testing
      - /var/run/docker.sock:/var/run/docker.sock
      # Map the workspaces directory so files are accessible on the host
      - ./.workspaces:/app/.workspaces
      # Mount config read-only so per-node model choices can change without a rebuild
      - ./llm_config.yaml:/app/llm_config.yaml:ro
      # Mount profiles read-only so prompt/tooling changes can be tweaked without a rebuild
      - ./profiles:/app/profiles:ro
    env_file:
      - .env
    environment:
      # Pass the host user identity down so sandbox test containers can run
      # unprivileged instead of as root. Defaults to 1000:1000.
      - PUID=${PUID:-1000}
      - PGID=${PGID:-1000}
