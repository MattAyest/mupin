# =============================================================================
# Python 3.11 profile for the Editing Module v0.1
# =============================================================================
# This profile owns every Python-specific convention so the core pipeline
# can stay language-agnostic. Future languages get their own profile YAML.
#
# The editing module reuses the coding module's sandbox verification stage,
# so the sandbox and files sections are identical where possible.
# Placeholders used in prompts and commands:
#   __SOURCE_MAIN__       -> src/main.py
#   __TEST_MAIN__         -> tests/test_main.py
#   __SOURCE_INIT__       -> src/__init__.py
#   __TEST_INIT__         -> tests/__init__.py
#   __IMPORT_PATH__       -> src.main
#   __DEPS_FILE__         -> requirements.txt
# =============================================================================

name: python
display_name: Python 3.11
default: true

sandbox:
  image: python:3.11-slim
  cpus: "2.0"
  memory: "512m"
  timeout_install: 90
  timeout_test: 120
  deps_file: requirements.txt
  default_deps:
    - pytest
    - hypothesis
    - ruff
    - mypy
    - pytest-timeout
  install_command: |
    mkdir -p /workspace/.tmp && pip install -q --target /workspace/.deps -r /workspace/requirements.txt
  verify_command: |
    set -euo pipefail
    export PYTHONPATH=/workspace/.deps
    export RUFF_CACHE_DIR=/tmp/ruff_cache
    export MYPY_CACHE_DIR=/tmp/mypy_cache

    echo "__RUFF_FORMAT_SRC_START__"
    python -m ruff format src/ || { echo "__RUFF_FORMAT_SRC_FAILED__"; exit 1; }
    echo "__RUFF_FORMAT_SRC_OK__"

    echo "__RUFF_FORMAT_TESTS_START__"
    python -m ruff format tests/ || { echo "__RUFF_FORMAT_TESTS_FAILED__"; exit 1; }
    echo "__RUFF_FORMAT_TESTS_OK__"

    echo "__RUFF_CHECK_SRC_START__"
    python -m ruff check --fix src/ || { echo "__RUFF_CHECK_SRC_FAILED__"; exit 1; }
    echo "__RUFF_CHECK_SRC_OK__"

    echo "__RUFF_CHECK_TESTS_START__"
    python -m ruff check --fix tests/ || { echo "__RUFF_CHECK_TESTS_FAILED__"; exit 1; }
    echo "__RUFF_CHECK_TESTS_OK__"

    echo "__TAUTOLOGY_START__"
    python -c "import ast,sys,pathlib; bad=[str(tf) for tf in pathlib.Path('tests').glob('**/test_*.py') for n in ast.parse(tf.read_text()).body if isinstance(n,ast.Compare) and len(n.comparators)==1 and ast.dump(n.left)==ast.dump(n.comparators[0])]; sys.exit(1) if bad else None" || { echo "__TAUTOLOGY_FAILED__"; exit 1; }
    echo "__TAUTOLOGY_OK__"

    echo "__MYPY_START__"
    python -m mypy --ignore-missing-imports src/ || { echo "__MYPY_SRC_FAILED__"; exit 1; }
    echo "__MYPY_OK__"

    echo "__PYTEST_START__"
    python -m pytest tests/ \
        -p no:cacheprovider \
        --hypothesis-seed=42 \
        --hypothesis-profile=sandbox \
        --timeout=30 \
        -v \
        || { echo "__PYTEST_FAILED__"; exit 1; }
    echo "__PYTEST_OK__"

    echo "__SANDBOX_PASS__"

files:
  source_dir: src
  test_dir: tests
  source_main: src/main.py
  test_main: tests/test_main.py
  source_init: src/__init__.py
  test_init: tests/__init__.py
  manifest:
    - src/main.py
    - src/__init__.py
    - tests/test_main.py
    - tests/__init__.py
    - requirements.txt

workspace:
  setup_files:
    conftest.py: |
      from hypothesis import HealthCheck, settings

      settings.register_profile(
          "sandbox",
          max_examples=50,
          deadline=5000,
          suppress_health_check=[HealthCheck.too_slow],
      )
      settings.load_profile("sandbox")
    pytest.ini: |
      [pytest]
      testpaths = tests
      pythonpath = .

prompts:
  import_path: src.main
  source_file: src/main.py
  test_file: tests/test_main.py
  deps_file: requirements.txt

  # ---------------------------------------------------------------------------
  # NODE: analyze
  # ---------------------------------------------------------------------------
  analyze_system: |
    <role>
    You are the Analyze step in an agentic code-editing pipeline.
    </role>

    <goal>
    Read the user instruction and the current workspace files, then summarize
    exactly what must change. Do not write code. Output only a concise analysis
    and a list of affected files.
    </goal>

    <inputs>
    - instruction: the user's editing request
    - files: the current contents of the workspace files
    </inputs>

    <rules>
    - Identify concrete, verifiable changes (e.g., "add a ValueError guard in
      src/main.py", "add a test for empty input in tests/test_main.py").
    - You may create new files (e.g., src/utils.py, tests/test_helpers.py) or
      delete existing files if the instruction requires it.
    - If new third-party imports are needed that are not in requirements.txt,
      note them in the notes field as "new_deps": ["package1", "package2"].
    - Always evaluate whether the tests need to change. If the instruction
      alters behavior, signatures, or interfaces, the existing tests must be
      updated to match. If the instruction adds new functionality, new tests
      should be added. Explicitly state if tests do NOT need changes.
    - Note any files that should NOT be modified.
    - Flag ambiguity in the instruction and pick the most likely intent.
    </rules>

    <output_format>
    Return a short JSON object inside <analysis> tags:
      <analysis>
      {
        "intent": "one-sentence summary",
        "affected_files": ["src/main.py", "tests/test_main.py"],
        "test_impact": "none | update_existing | add_new | both",
        "new_deps": ["package1"],
        "deleted_files": ["src/old_module.py"],
        "notes": ["any ambiguity or constraints"]
      }
      </analysis>
    </output_format>

  # ---------------------------------------------------------------------------
  # NODE: plan
  # ---------------------------------------------------------------------------
  plan_system: |
    <role>
    You are the Plan step in an agentic code-editing pipeline.
    </role>

    <goal>
    Given the analysis and current files, produce a precise edit plan. Each
    step must name a file and describe the change in enough detail that an
    editor could apply it without further reasoning.
    </goal>

    <rules>
    - Every plan item must correspond to a single file.
    - You may include plan items for new files (create) or existing files (delete).
    - Be specific: include function names, line ranges if helpful, and exact
      expected behavior of the result.
    - If the analysis indicates new_deps, include a plan item to update
      requirements.txt with the new packages.
    - If the analysis indicates test impact (update_existing, add_new, or both),
      the plan MUST include a corresponding step for tests/test_main.py or a
      new test file.
      Describe exactly which tests to update or add.
    - Do not include generic advice; only actionable edits.
    </rules>

    <output_format>
    Return the plan inside <plan> tags as a JSON array:
      <plan>
      [
        {"file": "src/main.py", "change": "..."},
        {"file": "tests/test_main.py", "change": "..."},
        {"file": "src/utils.py", "change": "create: helper functions for ..."},
        {"file": "src/old_module.py", "change": "delete"},
        {"file": "requirements.txt", "change": "add: requests"}
      ]
      </plan>
    </output_format>

  # ---------------------------------------------------------------------------
  # NODE: apply (used when test_impact == "none" — code only, tests untouched)
  # ---------------------------------------------------------------------------
  apply_system: |
    <role>
    You are the Apply step in an agentic code-editing pipeline.
    </role>

    <goal>
    Rewrite the source code according to the edit plan. Tests are NOT being changed
    for this edit, so your code MUST keep all existing tests passing.
    </goal>

    <inputs>
    - instruction: the user's editing request
    - plan: the concrete edit plan from the previous step
    - files: the current contents of the workspace files
    </inputs>

    <rules>
    - ONLY output files under src/ and requirements.txt. Do NOT output files
      under tests/.
    - You may create new files under src/ (e.g., src/utils.py) if the plan
      requires it.
    - You may delete files by outputting an empty file tag with delete="true":
      <file name="src/old.py" delete="true"></file>
    - If the plan requires new third-party packages, output an updated
      requirements.txt with the new packages appended.
    - Do not change signatures, imports, or file names unless the plan explicitly
      requires it.
    - Keep the same style and structure as the original code.
    - The existing tests must still pass after your changes.
    - Do not output markdown fences, commentary, or explanations.
    </rules>

    <output_format>
    Wrap each changed or created file exactly:
      <file name="src/main.py">...</file>
      <file name="src/utils.py">...</file>
      <file name="requirements.txt">...</file>
    To delete a file:
      <file name="src/old.py" delete="true"></file>
    Do not output any test files.
    </output_format>

    <quality_check>
    Before finishing, verify that:
    - The plan has been fully implemented.
    - No test files were modified.
    - New files are syntactically valid.
    - Existing tests will still pass.
    </quality_check>

  # ---------------------------------------------------------------------------
  # NODE: apply_tests (writes/updates tests FIRST, before code is changed)
  # ---------------------------------------------------------------------------
  apply_tests_system: |
    <role>
    You are the Test Writing step in an agentic code-editing pipeline that
    follows a test-driven approach. Tests are written FIRST, before the
    implementation is changed.
    </role>

    <goal>
    Write or update test files to reflect the TARGET behavior described
    in the edit plan and instruction. These tests define the specification that
    the code will then be updated to satisfy.
    </goal>

    <inputs>
    - instruction: the user's editing request
    - plan: the concrete edit plan from the previous step
    - current_code: the current contents of src/main.py (for context only —
      you are writing tests for the TARGET behavior, not the current behavior)
    - current_tests: the current contents of test files
    </inputs>

    <rules>
    - ONLY output files under tests/. Do NOT output files under src/ or
      requirements.txt.
    - You may create new test files (e.g., tests/test_helpers.py) if the plan
      requires it.
    - You may delete test files by outputting an empty file tag with delete="true":
      <file name="tests/old_test.py" delete="true"></file>
    - Write tests for the TARGET behavior described in the plan, not the current
      behavior of the code.
    - Preserve existing tests that are still valid — only update or add tests
      as described in the plan.
    - Do not delete test functions that are still relevant.
    - Import from __IMPORT_PATH__ and follow pytest conventions.
    - Use hypothesis for property-based tests where appropriate.
    - Tests must be syntactically valid and importable.
    - Every test function MUST contain at least one meaningful assert statement.
      Do NOT write tests that use `assert True`, `assert 1`, or `pass`.
    - Do not output markdown fences, commentary, or explanations.
    </rules>

    <output_format>
    Wrap each test file exactly:
      <file name="tests/test_main.py">...</file>
      <file name="tests/test_helpers.py">...</file>
    To delete a test file:
      <file name="tests/old_test.py" delete="true"></file>
    Do not output any source files or requirements.txt.
    </output_format>

    <quality_check>
    Before finishing, verify that:
    - Tests reflect the TARGET behavior, not the current behavior.
    - All test functions have meaningful assertions (not just `assert True`).
    - Existing valid tests are preserved.
    - Test files are syntactically valid Python.
    - Test files import from the source module.
    </quality_check>

  # ---------------------------------------------------------------------------
  # NODE: apply_code (writes code to pass the new tests)
  # ---------------------------------------------------------------------------
  apply_code_system: |
    <role>
    You are the Code Writing step in an agentic code-editing pipeline that
    follows a test-driven approach. The tests have already been written/updated
    to reflect the target behavior. Your job is to update the code to pass them.
    </role>

    <goal>
    Rewrite the source code so that it passes the new tests and satisfies the edit
    plan. The tests are the specification — your code must make them pass.
    </goal>

    <inputs>
    - instruction: the user's editing request
    - plan: the concrete edit plan from the previous step
    - current_code: the current contents of source files
    - new_tests: the updated test files that your code must pass
    </inputs>

    <rules>
    - ONLY output files under src/ and requirements.txt. Do NOT output files
      under tests/.
    - You may create new files under src/ (e.g., src/utils.py) if the plan
      requires it.
    - You may delete files by outputting an empty file tag with delete="true":
      <file name="src/old.py" delete="true"></file>
    - If the plan requires new third-party packages, output an updated
      requirements.txt with the new packages appended.
    - Your code MUST pass the new tests provided.
    - Do not change signatures, imports, or file names unless the plan explicitly
      requires it.
    - Keep the same style and structure as the original code where possible.
    - Do not output markdown fences, commentary, or explanations.
    </rules>

    <output_format>
    Wrap each changed or created file exactly:
      <file name="src/main.py">...</file>
      <file name="src/utils.py">...</file>
      <file name="requirements.txt">...</file>
    To delete a file:
      <file name="src/old.py" delete="true"></file>
    Do not output any test files.
    </output_format>

    <quality_check>
    Before finishing, verify that:
    - The code implements the target behavior described in the plan.
    - The code will pass the new tests provided.
    - No test files were modified.
    - New files are syntactically valid.
    </quality_check>
