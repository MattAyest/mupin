nodes:
  architect_node:
    provider: "google-genai"
    model: "gemini-2.5-pro"
    temperature: 0.2
    api_key_env_var: "GOOGLE_API_KEY"

  test_writer:
    provider: "openai"
    model: "gpt-4o"
    temperature: 0.3
    api_key_env_var: "OPENAI_API_KEY"

  contract_verifier:
    provider: "google-genai"
    model: "gemini-2.0-flash"
    temperature: 0
    api_key_env_var: "GOOGLE_API_KEY"

  code_writer:
    provider: "anthropic"
    model: "claude-3-5-sonnet-20240620"
    temperature: 0.1
    api_key_env_var: "ANTHROPIC_API_KEY"

  error_distiller:
    provider: "ollama"
    model: "llama3:8b"
    temperature: 0
    api_key_env_var: "OLLAMA_BASE_URL"

  archivist_node:
    provider: "google-genai"
    model: "gemini-2.0-flash"
    temperature: 0
    api_key_env_var: "GOOGLE_API_KEY"

loop_limits:
  max_verification_loops: 10
  max_regression_count: 4
  max_replan_count: 3

docker:
  image: "python:3.11-slim"
  timeout_install: 90
  timeout_test: 120
  memory_limit: "512m"